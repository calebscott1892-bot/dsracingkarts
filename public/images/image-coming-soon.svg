<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Chequered tile pattern -->
    <pattern id="checker" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#1a1a1a"/>
      <rect x="20" width="20" height="20" fill="#141414"/>
      <rect y="20" width="20" height="20" fill="#141414"/>
      <rect x="20" y="20" width="20" height="20" fill="#1a1a1a"/>
    </pattern>
    <!-- Red glow filter -->
    <filter id="redglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#e60012" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#0a0a0a"/>

  <!-- Chequered pattern overlay (subtle) -->
  <rect width="800" height="800" fill="url(#checker)" opacity="0.4"/>

  <!-- Red accent border lines top and bottom -->
  <rect y="0" width="800" height="4" fill="#e60012"/>
  <rect y="796" width="800" height="4" fill="#e60012"/>

  <!-- Camera icon (centered, ~200px wide) -->
  <g transform="translate(400, 320)" filter="url(#redglow)">
    <!-- Camera body -->
    <rect x="-90" y="-55" width="180" height="130" rx="18" ry="18"
          fill="none" stroke="#e60012" stroke-width="8"/>
    <!-- Viewfinder notch -->
    <path d="M-30,-55 L-18,-78 L18,-78 L30,-55" fill="none" stroke="#e60012" stroke-width="8" stroke-linejoin="round"/>
    <!-- Lens outer circle -->
    <circle cx="0" cy="12" r="42" fill="none" stroke="#e60012" stroke-width="8"/>
    <!-- Lens inner circle -->
    <circle cx="0" cy="12" r="24" fill="none" stroke="#e60012" stroke-width="5" opacity="0.5"/>
    <!-- Flash indicator -->
    <circle cx="62" cy="-28" r="8" fill="#e60012" opacity="0.7"/>
  </g>

  <!-- "IMAGE" text -->
  <text
    x="400" y="490"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
    font-size="68"
    font-weight="900"
    letter-spacing="12"
    text-anchor="middle"
    fill="#ffffff"
  >IMAGE</text>

  <!-- "COMING SOON" text -->
  <text
    x="400" y="556"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
    font-size="36"
    font-weight="700"
    letter-spacing="8"
    text-anchor="middle"
    fill="#e60012"
  >COMING SOON</text>

  <!-- Thin divider line under COMING SOON -->
  <line x1="250" y1="575" x2="550" y2="575" stroke="#e60012" stroke-width="2" opacity="0.5"/>

  <!-- DS Racing Karts brand line -->
  <text
    x="400" y="610"
    font-family="Arial, Helvetica, sans-serif"
    font-size="20"
    letter-spacing="4"
    text-anchor="middle"
    fill="#4a4a4a"
  >DS RACING KARTS</text>
</svg>
